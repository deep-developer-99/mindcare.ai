<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriMate AI - Diet Plan Generator</title>
    <link rel="stylesheet" href="assets/css/cursor.css" />
    <link rel="stylesheet" href="assets/css/shared-footer.css" />
    <link rel="stylesheet" href="assets/css/shared-profile.css" />
    <script src="assets/js/config.js"></script>
    <script>
        (function () {
            const LOGIN_PAGE_URL = window.location.protocol === 'file:'
                ? 'auth/login-page/index.html'
                : '/auth/login-page/index.html';
            const API_BASE = CONFIG.getApiBase();
            document.documentElement.style.visibility = 'hidden';

            fetch(`${API_BASE}/api/auth/verify`, {
                method: 'GET',
                credentials: 'include',
                cache: 'no-store'
            })
                .then((response) => {
                    if (!response.ok) throw new Error('Unauthorized');
                    document.documentElement.style.visibility = 'visible';
                })
                .catch(() => {
                    window.location.replace(LOGIN_PAGE_URL);
                });
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(900px 500px at 10% 15%, rgba(244, 63, 94, 0.15), transparent 40%),
                        radial-gradient(700px 400px at 90% 80%, rgba(56, 189, 248, 0.15), transparent 40%),
                        linear-gradient(135deg, #070a13 0%, #111827 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #e5e7eb;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mc-top-nav {
            position: sticky;
            top: 10px;
            z-index: 50;
            width: 100%;
            max-width: 900px;
            margin: 0 auto 22px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
        }
        .mc-top-nav-links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px 14px;
        }
        .mc-top-nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.92rem;
            transition: color 0.2s ease;
        }
        .mc-top-nav a:hover { color: #38bdf8; }
        .mc-top-nav a.active { color: #f43f5e; }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 40px;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 35px;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #38bdf8, #c084fc, #f43f5e);
            -webkit-background-clip: text;
            color: transparent;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(11, 18, 32, 0.6);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #38bdf8;
            outline: none;
            background: rgba(11, 18, 32, 0.85);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }

        button {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f43f5e, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 8px 24px rgba(244, 63, 94, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(244, 63, 94, 0.45);
        }

        /* Results Area */
        #result-area {
            display: none;
            margin-top: 40px;
            padding: 30px;
            background: rgba(11, 18, 32, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        .results-header {
            font-size: 1.5rem;
            color: #38bdf8;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
            padding-bottom: 10px;
        }

        .result-content {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 1.05rem;
            color: #e2e8f0;
        }

        .loader {
            display: none;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #f43f5e;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="mc-top-nav" aria-label="Primary">
    <div class="mc-top-nav-links">
        <a href="Him2.html">Home</a>
        <a href="jarvis-mate.html">Talk to AI</a>
        <a href="yoga.html">Yoga Guide</a>
        <a href="blog/Blog2.html">Blog</a>
        <a href="nutrimate-ai.html" class="active">Nutritionist</a>
    </div>
</nav>

<div class="container">
    <h1>NutriMate AI</h1>
    
    <form id="diet-form">
        <div class="grid-2">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" required min="10" max="100">
            </div>
            <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" required step="0.1" min="20">
            </div>
            <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" required min="100">
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="transgender">Transgender</option>
                </select>
            </div>
            <div class="form-group">
                <label for="goal">Primary Goal</label>
                <select id="goal" required>
                    <option value="weight loss">Weight Loss</option>
                    <option value="muscle gain">Muscle Gain</option>
                    <option value="maintenance">Maintenance</option>
                </select>
            </div>
            <div class="form-group">
                <label for="condition">Medical Condition</label>
                <select id="condition" required>
                    <option value="none">None</option>
                    <option value="diabetes">Diabetes</option>
                    <option value="pcos">PCOS</option>
                    <option value="hypertension">Hypertension</option>
                </select>
            </div>
            <div class="form-group">
                <label for="lifestyle">Lifestyle</label>
                <select id="lifestyle" required>
                    <option value="sedentary">Sedentary (Little to no exercise)</option>
                    <option value="moderate">Moderate (Exercise 3-5 days/wk)</option>
                    <option value="active">Active (Exercise 6-7 days/wk)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="diet_type">Diet Preference</label>
                <select id="diet_type" required>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="non-vegetarian">Non-Vegetarian</option>
                    <option value="vegan">Vegan</option>
                </select>
            </div>
        </div>

        <button type="submit" id="submit-btn">✨ Generate Personalized Diet Plan</button>
    </form>

    <div class="loader" id="loader"></div>

    <div id="result-area">
        <div class="results-header">Your NutriMate Diet Plan</div>
        <div id="result-content" class="result-content"></div>
    </div>
</div>

<script>
    document.getElementById('diet-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('result-area');
        const resultContent = document.getElementById('result-content');
        const submitBtn = document.getElementById('submit-btn');

        const userData = {
            age: document.getElementById('age').value,
            weight: document.getElementById('weight').value,
            height: document.getElementById('height').value,
            gender: document.getElementById('gender').value,
            goal: document.getElementById('goal').value,
            condition: document.getElementById('condition').value,
            lifestyle: document.getElementById('lifestyle').value,
            diet_type: document.getElementById('diet_type').value
        };

        // UI Feedback
        loader.style.display = 'block';
        resultArea.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Generating...';

        try {
            const response = await fetch('/api/diet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            const data = await response.json();
            
            loader.style.display = 'none';
            resultArea.style.display = 'block';
            
            if (response.ok) {
                // Typewriter effect
                const text = `📊 BMI: ${data.bmi} (${data.type})\n👤 Gender: ${userData.gender}\n\n${data.diet_plan}`;
                resultContent.textContent = '';
                let i = 0;
                const typing = setInterval(() => {
                    if (i < text.length) {
                        resultContent.textContent += text.charAt(i);
                        i++;
                    } else {
                        clearInterval(typing);
                    }
                }, 10);
            } else {
                resultContent.textContent = `Error: ${data.error || 'Failed to generate diet plan.'}`;
            }

        } catch (error) {
            console.error('Error:', error);
            loader.style.display = 'none';
            resultArea.style.display = 'block';
            resultContent.textContent = 'Could not connect to NutriMate server. Ensure it is running on port 5004.';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '✨ Generate Personalized Diet Plan';
        }
    });
</script>

<script src="assets/js/cursor.js"></script>
</body>
</html>
