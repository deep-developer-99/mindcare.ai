<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account — Clean Signup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../assets/css/cursor.css">
</head>

<body>
  <main class="page">
    <form id="createAccountForm" class="card" novalidate>
      <h1>Create Account</h1>

      <div class="row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input id="firstName" name="firstName" type="text" required />
        </div>
        <div class="field">
          <label for="lastName">Last Name</label>
          <input id="lastName" name="lastName" type="text" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="dob">Date of Birth</label>
          <input id="dob" name="dob" type="text" placeholder="YYYY-MM-DD" required />
        </div>
        <div class="field">
          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="">Select...</option>
            <option>Female</option>
            <option>Male</option>
            <option>Non-binary</option>
            <option>Prefer not to say</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field full">
          <label for="mobile">Mobile Number (include country code)</label>
          <input id="mobile" name="mobile" type="tel" pattern="[0-9+ \-()]{6,20}" placeholder="e.g. +1 555 555 5555"
            title="Include country code, e.g. +1 555 555 5555" required />
        </div>
      </div>

      <div class="row">
        <div class="field full">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="city">City</label>
          <input id="city" name="city" type="text" placeholder="e.g. New York" required />
        </div>
        <div class="field">
          <label for="occupation">Occupation</label>
          <input id="occupation" name="occupation" type="text" placeholder="e.g. Student / Engineer" required />
        </div>
      </div>

      <div class="row">
        <div class="field full">
          <label for="relationship">Relationship Status</label>
          <select id="relationship" name="relationship" required>
            <option value="">Select...</option>
            <option>Single</option>
            <option>In One-Sided Love</option>
            <option>In a relationship</option>
            <option>Married</option>
            <option>Separated</option>
            <option>Prefer not to say</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <fieldset class="mental">
        <legend>Do you have any mental issue?</legend>
        <label class="radio"><input type="radio" name="mental" value="no" checked /> No</label>
        <label class="radio"><input type="radio" name="mental" value="yes" /> Yes</label>

        <div id="mentalDetails" class="details" hidden>
          <label for="mentalText">If yes, please provide brief details (optional)</label>
          <textarea id="mentalText" name="mentalText" rows="3" placeholder="Optional details"></textarea>
        </div>
      </fieldset>

      <div class="row">
        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input id="password" name="password" type="password" minlength="8" placeholder="at least 8 characters"
              required />
            <button type="button" class="toggle-visibility" aria-label="Show password"
              data-target="password">Show</button>
          </div>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input id="confirmPassword" name="confirmPassword" type="password" minlength="8"
              placeholder="at least 8 characters" required />
            <button type="button" class="toggle-visibility" aria-label="Show password"
              data-target="confirmPassword">Show</button>
          </div>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn">Create Account</button>
      </div>

      <div class="auth-switch">
        Already have an account? <a href="/auth/login-page/index.html">Login</a>
      </div>

      <div id="message" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="script.js"></script>
  <script src="../assets/js/cursor.js"></script>
</body>

</html>
